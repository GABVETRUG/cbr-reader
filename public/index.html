<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Dylan Dog Reader</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Library View -->
  <div id="library" class="view active">
    <header class="library-header">
      <div class="header-content">
        <h1 class="logo">Dylan Dog</h1>
        <p class="subtitle">La tua collezione</p>
      </div>
      <div class="header-actions">
        <button id="searchToggle" class="icon-btn" aria-label="Cerca">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button id="filterToggle" class="icon-btn" aria-label="Filtra">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        </button>
      </div>
    </header>

    <div id="searchBar" class="search-bar hidden">
      <input type="text" id="searchInput" placeholder="Cerca fumetto..." autocomplete="off">
    </div>

    <div id="filterBar" class="filter-bar hidden">
      <button class="filter-chip active" data-folder="">Tutti</button>
    </div>

    <div id="orgBar" class="org-bar hidden">
      <button class="org-chip active" data-view="all">Tutti</button>
      <button class="org-chip" data-view="favorites">Preferiti</button>
      <!-- Dynamic folder/compartment chips appended by JS -->
    </div>

    <div id="statsBar" class="stats-bar">
      <span id="comicCount">Caricamento...</span>
    </div>

    <div id="readingSection" class="reading-section hidden">
      <h2 class="section-title">Stai leggendo</h2>
      <div id="readingRow" class="reading-row"></div>
    </div>

    <div id="comicsGrid" class="comics-grid">
      <!-- Comics will be rendered here -->
    </div>

    <div id="loadingOverlay" class="loading-overlay active">
      <div class="loader">
        <div class="loader-ring"></div>
        <p>Caricamento collezione...</p>
      </div>
    </div>
  </div>

  <!-- Reader View -->
  <div id="reader" class="view">
    <!-- Top bar — always visible -->
    <div id="readerHeader" class="reader-header">
      <button id="backBtn" class="icon-btn" aria-label="Torna alla libreria">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="reader-title">
        <span id="readerComicTitle"></span>
        <span id="readerPageInfo" class="page-info"></span>
      </div>
      <button id="readingModeBtn" class="icon-btn" aria-label="Cambia modalità lettura">
        <svg id="modeIconSwipe" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 4 16 12 8 20"/></svg>
        <svg id="modeIconScroll" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-hidden"><polyline points="4 8 12 16 20 8"/></svg>
      </button>
    </div>

    <!-- Horizontal swipe mode -->
    <div id="swipeReader" class="swipe-reader">
      <div id="swipeContainer" class="swipe-container">
        <!-- Pages rendered dynamically -->
      </div>
      <!-- Desktop nav arrows -->
      <button id="prevPageBtn" class="nav-arrow nav-arrow-left" aria-label="Pagina precedente">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="nextPageBtn" class="nav-arrow nav-arrow-right" aria-label="Pagina successiva">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
    </div>

    <!-- Vertical scroll mode -->
    <div id="scrollReader" class="scroll-reader hidden">
      <div id="scrollContainer" class="scroll-container">
        <!-- Pages rendered dynamically -->
      </div>
    </div>

    <!-- Bottom toolbar — always visible -->
    <div id="readerToolbar" class="reader-toolbar">
      <div class="toolbar-progress">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="toolbar-controls">
        <button id="toolbarBackBtn" class="toolbar-btn" aria-label="Torna alla libreria">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Libreria</span>
        </button>
        <div class="toolbar-page-nav">
          <button id="toolbarPrevBtn" class="toolbar-btn-sm" aria-label="Pagina precedente">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <input type="range" id="pageRange" min="0" max="0" value="0">
          <button id="toolbarNextBtn" class="toolbar-btn-sm" aria-label="Pagina successiva">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
          </button>
        </div>
        <button id="toolbarNotesBtn" class="toolbar-btn" aria-label="Note">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>Note</span>
        </button>
        <button id="toolbarModeBtn" class="toolbar-btn" aria-label="Cambia modalità">
          <svg id="toolbarModeIconH" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          <span id="toolbarModeLabel">Swipe</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Notes Panel (in reader) -->
  <div id="notesPanel" class="notes-panel hidden">
    <div class="notes-panel-backdrop"></div>
    <div class="notes-panel-content">
      <div class="notes-header">
        <span>Note</span>
        <button id="closeNotesBtn" class="icon-btn-sm" aria-label="Chiudi">&times;</button>
      </div>
      <div id="notesList" class="notes-list">
        <!-- Notes rendered dynamically -->
      </div>
      <div class="notes-input">
        <textarea id="noteInput" placeholder="Scrivi una nota..." rows="2"></textarea>
        <button id="saveNoteBtn" class="accent-btn">Salva</button>
      </div>
    </div>
  </div>

  <!-- Action Sheet (long-press on comic card) -->
  <div id="actionSheet" class="action-sheet hidden">
    <div class="action-sheet-backdrop"></div>
    <div class="action-sheet-content">
      <div class="action-sheet-header">
        <span id="actionSheetTitle"></span>
        <button id="actionSheetClose" class="icon-btn-sm" aria-label="Chiudi">&times;</button>
      </div>
      <div class="action-sheet-body">
        <button class="action-item" data-action="toggleFavorite">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span id="favActionLabel">Aggiungi ai preferiti</span>
        </button>
        <div class="action-item action-color-row">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12" r="2.5"/><path d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12c0 2.4.85 4.6 2.26 6.33.67.82 2.55 1.67 3.74 1.67h1a1 1 0 0 0 1-1v-.5c0-.55.45-1 1-1s1 .45 1 1v.5a1 1 0 0 0 1 1h1"/></svg>
          <span>Colore</span>
          <div id="colorPalette" class="color-palette"></div>
        </div>
        <button class="action-item" data-action="assignFolder">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span id="folderActionLabel">Cartella</span>
        </button>
        <button class="action-item" data-action="assignCompartment">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span id="compartmentActionLabel">Categoria</span>
        </button>
        <button class="action-item" data-action="openNotes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>Note</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Prompt Dialog (for folder/compartment names) -->
  <div id="promptDialog" class="prompt-dialog hidden">
    <div class="prompt-dialog-backdrop"></div>
    <div class="prompt-dialog-content">
      <p id="promptDialogTitle"></p>
      <input type="text" id="promptDialogInput" autocomplete="off">
      <div class="prompt-dialog-actions">
        <button id="promptDialogCancel" class="prompt-btn">Annulla</button>
        <button id="promptDialogOk" class="accent-btn">OK</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
